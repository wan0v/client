appId: com.gryt.chat
productName: Gryt Chat
executableName: gryt-chat
copyright: "Copyright © 2024-2026 Gryt Chat. All rights reserved."
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - electron/splash.html
extraResources:
  - from: build/icon.png
    to: icon.png
  - from: build/native/
    to: native/
    filter:
      - "**/*"

publish:
  provider: github
  owner: Gryt-chat
  repo: gryt
  releaseType: release

afterSign: scripts/notarize.cjs

protocols:
  - name: Gryt
    schemes:
      - gryt

linux:
  target:
    - AppImage
    - deb
  category: Network
  synopsis: "Real-time voice chat"
  description: "Gryt Chat — real-time voice chat desktop client"
  mimeTypes:
    - x-scheme-handler/gryt

mac:
  target:
    - dmg
    - zip
  hardenedRuntime: true
  category: public.app-category.social-networking
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: "Gryt Chat uses your microphone for voice chat."
    NSCameraUsageDescription: "Gryt Chat uses your camera for video chat."
    NSAudioCaptureUsageDescription: "Gryt Chat can capture audio when you choose to share your screen."
    NSScreenCaptureUsageDescription: "Gryt Chat lets you share your screen."

win:
  icon: build/icon.ico
  target:
    - nsis
    - portable
  legalTrademarks: "Gryt Chat is a trademark of Gryt Chat"
  requestedExecutionLevel: asInvoker

portable:
  artifactName: "${productName}-${version}-${os}-${arch}-portable.${ext}"

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false
  displayLanguageSelector: false
  uninstallDisplayName: "Gryt Chat"
  shortcutName: "Gryt Chat"
